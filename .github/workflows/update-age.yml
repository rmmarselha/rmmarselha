name: Update Age in README

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Update README with NodeJS
        run: |
          node -e "
          const fs = require('fs');
          const path = 'README.md';
          let content = fs.readFileSync(path, 'utf8');
          
          // Defina sua data de nascimento aqui
          const birthDate = new Date('1993-01-01');
          const today = new Date();
          let age = today.getFullYear() - birthDate.getFullYear();
          const m = today.getMonth() - birthDate.getMonth();
          if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
              age--;
          }

          const newSvg = '[![Typing SVG](https://readme-typing-svg.herokuapp.com/?color=1e929e&size=35&center=true&vCenter=true&width=1000&lines=OLÁ,+MEU+NOME+É+REINOR+MARSELHA;TENHO+' + age + '+ANOS!;+BEM-VINDO!)](https://git.io/typing-svg)';
          
          const startTag = '';
          const endTag = '';
          
          // A lógica abaixo garante que TUDO entre as tags seja substituído por uma única linha
          const regex = new RegExp(startTag + '[\\\\s\\\\S]*?' + endTag);
          const newContent = content.replace(regex, startTag + '\\n' + newSvg + '\\n' + endTag);
          
          fs.writeFileSync(path, newContent);
          "

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Bot: Idade sincronizada" || echo "Sem mudanças"
          git push
